name: CI/CD

on:
  pull_request:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_COLOR: 1
  UV_CACHE_DIR: ~/.cache/uv

permissions:
  contents: read

concurrency:
  cancel-in-progress: false
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  uv:
    image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
    script:

  uv-install:
    variables:
      UV_CACHE_DIR: .uv-cache
    cache:
      - key:
          files:
            - uv.lock
        paths:
          - $UV_CACHE_DIR
    script:
      - uv cache prune --ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install uv and sync deps
        run: |
          pipx install uv
          uv sync --frozen --all-extras --dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  pre-commit:
    name: Run pre-commit (with PR feedback)
    runs-on: ubuntu-latest
    # Run only on PR events for feedback; skip on push/main
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install uv and sync deps
        run: |
          pipx install uv
          uv sync --frozen --all-extras --dev

      - name: Run pre-commit (capture output)
        id: pre-commit
        run: |
          set +e
          uv run pre-commit run --all-files > pre-commit-output.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          set -e
        continue-on-error: true

      - name: Comment on PR if pre-commit fails
        if: steps.pre-commit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs').promises;
            const core = require('@actions/core');
            const { context, github } = require('@actions/github');

            (async () => {
              const precommitOutput = await fs.readFile('pre-commit-output.txt', 'utf8');
              const lines = precommitOutput.split('\n');
              const last100Lines = lines.slice(-100).join('\n');
              const truncated = lines.length > 100;

              const message = `## ❌ Pre-commit checks failed

            Please fix the following issues locally:
            \`\`\`bash
            uv sync --frozen --all-extras --dev
            uv run pre-commit run --all-files
            \`\`\`

            💡 Tip: Run \`uv run pre-commit install\` to auto-run on commit.

            <details>
            <summary>Pre-commit output${truncated ? ' (last 100 lines)' : ''}</summary>
            \`\`\`txt
            ${last100Lines}
            \`\`\`
            </details>`;

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: message
                });
              } catch (error) {
                if (error.status === 403) {
                  core.warning('Cannot comment: check "Allow GitHub Actions to create PRs" in repo settings.');
                } else {
                  throw error;
                }
              }
            })();

      - name: Add pre-commit status label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { context, github } = require('@actions/github');
            const core = require('@actions/core');
            const exitCode = '${{ steps.pre-commit.outputs.exit_code }}';
            const newLabel = exitCode === '0' ? 'pre-commit: passed' : 'pre-commit: failed';
            const color = exitCode === '0' ? '0e8a16' : 'e74c3c';

            (async () => {
              const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100
              });

              // Remove old pre-commit labels
              for (const label of labels) {
                if (/^pre-commit:/i.test(label.name) && label.name !== newLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label.name
                  }).catch(() => {});
                }
              }

              // Ensure label exists
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: newLabel });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: newLabel,
                    color,
                    description: exitCode === '0' ? 'Pre-commit checks passed' : 'Pre-commit checks failed'
                  });
                }
              }

              // Apply if missing
              if (!labels.some(l => l.name === newLabel)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [newLabel]
                });
              }
            })();

      - name: Fail if pre-commit failed
        if: steps.pre-commit.outputs.exit_code != '0'
        run: exit 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv and venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install uv and deps
        run: |
          pipx install uv
          uv sync --frozen --all-extras --dev

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser chromium-chromedriver

      - name: Run tests
        run: |
          uv run python manage.py collectstatic --noinput
          timeout 10m xvfb-run --auto-servernum uv run python manage.py test --failfast
